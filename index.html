*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--navy:#1B2B4B;--navy2:#243559;--red:#B81C35;--red2:#D42040;
--blue:#1455A4;--blue2:#1A6AC7;--page:#F2F4F7;--surface:#FFFFFF;
--surface2:#F7F9FC;--text:#1A2332;--text2:#3D4F6B;--muted:#7A8BA8;
--border:#DDE3EC;--success:#0A7C55;--successbg:#E6F5EF;
--warning:#A05C00;--warnbg:#FFF3E0;--danger:#B81C35;--dangerbg:#FDEDF0;
--mono:'JetBrains Mono',monospace;--display:'Barlow Condensed',sans-serif;--body:'Inter',sans-serif;

body{background:var(--page);color:var(--text);font-family:var(--body)}
.app{min-height:100vh;background:var(--page)}
.hdr{background:var(--navy);border-bottom:3px solid var(--red);padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(27,43,75,.18)}
.hdr-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:20px;height:62px}
.logo-text{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.55);text-transform:uppercase;line-height:1.3}
.logo-text strong{display:block;font-size:17px;color:#fff;letter-spacing:1px;font-weight:800}
.hdr-divider{width:1px;height:32px;background:rgba(255,255,255,.15);margin:0 6px}
.hdr-title{font-family:var(--display);font-weight:800;font-size:24px;letter-spacing:3px;color:#fff;text-transform:uppercase}
.hdr-title span{color:#FF8FA0}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-time{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.45);letter-spacing:1px}
.btn{font-family:var(--display);font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:4px;cursor:pointer;border:none;transition:all .15s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red2)}
.btn-outline{background:transparent;color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.25)}.btn-outline:hover{background:rgba(255,255,255,.08);color:#fff}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:var(--blue2)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-ghost{background:transparent;color:rgba(255,255,255,.45);border:1px solid transparent}.btn-ghost:hover{color:rgba(255,255,255,.8)}
.btn-navy{background:var(--navy);color:#fff}
.home{max-width:1440px;margin:0 auto;padding:52px 28px}
.home-hero{text-align:center;margin-bottom:52px}
.home-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--blue);text-transform:uppercase;margin-bottom:14px}
.home-headline{font-family:var(--display);font-weight:800;font-size:60px;letter-spacing:4px;line-height:1;text-transform:uppercase;color:var(--navy);margin-bottom:10px}
.home-headline span{color:var(--red)}
.home-sub{font-size:14px;color:var(--muted)}
.home-select-wrap{max-width:460px;margin:0 auto}
.home-select-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;text-align:left}
.home-select{width:100%;background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-family:var(--body);font-size:14px;padding:12px 14px;border-radius:6px;cursor:pointer;appearance:none;outline:none;transition:border-color .15s}

.dash{max-width:1440px;margin:0 auto;padding:24px 28px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:20px}
.breadcrumb-sep{color:var(--border)}
.breadcrumb-cur{color:var(--navy);font-weight:600}
.breadcrumb-link{cursor:pointer;color:var(--blue)}
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:16px 20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.kpi.blue::before{background:var(--blue)}.kpi.red::before{background:var(--red)}
.kpi.green::before{background:var(--success)}.kpi.warn::before{background:var(--warning)}
.kpi-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.kpi-value{font-family:var(--display);font-weight:700;font-size:26px;letter-spacing:.5px;line-height:1;color:var(--navy)}
.kpi-value.blue{color:var(--blue)}.kpi-value.red{color:var(--red)}
.kpi-value.green{color:var(--success)}.kpi-value.warn{color:var(--warning)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.kpi-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.section-wrap{margin-bottom:10px}
.section-hdr{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:13px 18px;cursor:pointer;user-select:none;transition:border-color .15s,box-shadow .15s}
.section-hdr:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(20,85,164,.07)}
.section-hdr.open{border-radius:8px 8px 0 0;border-color:var(--blue);border-bottom-color:transparent}
.section-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--surface2);border:1px solid var(--border)}
.section-title{font-family:var(--display);font-weight:700;font-size:15px;letter-spacing:1px;text-transform:uppercase;color:var(--navy)}
.section-meta{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
.section-chevron{color:var(--muted);font-size:11px;margin-left:8px;transition:transform .2s}
.section-chevron.open{transform:rotate(180deg)}
.section-body{background:var(--surface);border:1.5px solid var(--blue);border-top:none;border-radius:0 0 8px 8px;padding:20px}
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:left;padding:8px 10px;border-bottom:1.5px solid var(--border);background:var(--surface2)}
.data-table td{padding:10px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#EEF4FB}
.mono{font-family:var(--mono)}
.text-right{text-align:right}

.tbl-input:focus{border-color:var(--blue);background:#fff}
.tbl-select{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-family:var(--body);font-size:12px;padding:5px 8px;border-radius:4px;outline:none}

.alert-danger{background:var(--dangerbg);border:1px solid #F0AABB;color:var(--danger)}
.alert-warn{background:var(--warnbg);border:1px solid #F0C060;color:var(--warning)}

function fmt(n) {
  if (Math.abs(n) >= 1000000) return "$" + (n/1000000).toFixed(1) + "M";
  if (Math.abs(n) >= 1000) return "$" + (n/1000).toFixed(0) + "K";
  return "$" + Math.round(n).toLocaleString();
}

function emptyProjects(n) {
  var arr = [];
  for (var i=0;i<n;i++) arr.push({name:"",months:Array(12).fill(0),po:""});
  return arr;
}
function emptyRoles() { return [{title:"",comp:0,startMonth:""},{title:"",comp:0,startMonth:""},{title:"",comp:0,startMonth:""}]; }
function emptyTE() { return {categories:[{name:"Travel",months:Array(12).fill(0)},{name:"Entertainment",months:Array(12).fill(0)},{name:"Other",months:Array(12).fill(0)}]}; }

function calcProjectTotal(projects) {
  return projects.filter(function(p){return p.name;}).reduce(function(s,p){return s+p.months.reduce(function(a,b){return a+b;},0);},0);
}
function calcTETotal(te) {
  return te.categories.reduce(function(s,c){return s+c.months.reduce(function(a,b){return a+b;},0);},0);
}
function calcOwnComp(emp) {
  var total = emp.personalComp;
  emp.openRoles.forEach(function(r){if(r.title&&r.comp)total+=Number(r.comp);});
  return total;
}
function getEffectiveComp(emp, managerEmp) {
  var changes = (managerEmp && managerEmp.compChanges && managerEmp.compChanges[emp.id]) || {};
  var comp = emp.personalComp;
  if (changes.eliminated) {
    var m = Number(changes.elimMonth||12);
    comp = (comp/12)*m;
  } else if (changes.newComp) {
    var cm = Number(changes.changeMonth||1);
    comp = (comp/12)*(cm-1) + (Number(changes.newComp)/12)*(12-cm+1);
  }
  return comp;
}

function BudgetSection(props) {
  var empId=props.empId; var employees=props.employees; var setEmployees=props.setEmployees;
  var emp=employees[empId];
  var pending=useState({target:"",amount:""}); var setPending=pending[1]; var pendingVal=pending[0];
  var lastSubmit=useState(null); var setLastSubmit=lastSubmit[1]; var lastSubmitVal=lastSubmit[0];

  var subBudgetTotal=emp.subordinates.reduce(function(s,sid){return s+(employees[sid]?employees[sid].budget:0);},0);
  var ownComp=calcOwnComp(emp);
  var teamComp=emp.subordinates.reduce(function(s,sid){return s+getEffectiveComp(employees[sid],emp);},0);
  var compAssigned=ownComp+teamComp;
  var totalAssigned=subBudgetTotal+compAssigned;
  var remaining=emp.budget-totalAssigned;

  function doSubmit(){
    if(!pendingVal.target||!pendingVal.amount)return;
    var amt=Number(pendingVal.amount);
    if(amt>remaining){alert("Insufficient budget. You only have "+fmt(remaining)+" remaining.");return;}
    setEmployees(function(prev){
      var next=Object.assign({},prev);
      var sub=Object.assign({},prev[pendingVal.target]);
      sub.budget=(sub.budget||0)+amt;
      next[pendingVal.target]=sub;
      return next;
    });
    setLastSubmit({target:pendingVal.target,amount:amt});
    setPending({target:"",amount:""});
  }
  function doRecall(){
    if(!lastSubmitVal)return;
    setEmployees(function(prev){
      var next=Object.assign({},prev);
      var sub=Object.assign({},prev[lastSubmitVal.target]);
      sub.budget=Math.max(0,(sub.budget||0)-lastSubmitVal.amount);
      next[lastSubmitVal.target]=sub;
      return next;
    });
    setLastSubmit(null);
  }

  return e("div",null,
    remaining<0?e("div",{className:"alert alert-danger"},"Budget over-allocated by "+fmt(Math.abs(remaining))):null,
    e("div",{className:"kpi-strip",style:{gridTemplateColumns:"repeat(4,1fr)",marginBottom:16}},
      e(KPICard,{label:"Total Budget",value:fmt(emp.budget),colorClass:"blue"}),
      e("div",{className:"kpi warn"},
        e("div",{className:"kpi-label"},"Total Comp (You + Team)"),
        e("div",{className:"kpi-value",style:{color:"var(--warning)"}},fmt(compAssigned)),
        e("div",{className:"kpi-sub"},"You: "+fmt(ownComp)+" / Team: "+fmt(teamComp))
      ),
      e(KPICard,{label:"Allocated to Team",value:fmt(subBudgetTotal),colorClass:"red"}),
      e(KPICard,{label:"Remaining",value:fmt(remaining),colorClass:remaining<0?"red":"green"})
    ),
    emp.subordinates.length>0?e("div",null,
      e("div",{className:"label-sm",style:{marginBottom:8}},"Allocate Budget to Subordinate"),
      e("div",{style:{display:"flex",gap:8,marginBottom:16}},
        e("select",{className:"tbl-select",value:pendingVal.target,onChange:function(ev){setPending(function(p){return Object.assign({},p,{target:ev.target.value});});}},
          e("option",{value:""},"Select employee..."),
          emp.subordinates.map(function(sid){
            return e("option",{key:sid,value:sid},employees[sid].name+" - "+employees[sid].title);
          })
        ),
        e("input",{className:"tbl-input",style:{width:160},type:"number",placeholder:"Amount ($)",value:pendingVal.amount,
          onChange:function(ev){setPending(function(p){return Object.assign({},p,{amount:ev.target.value});});}}),
        e("button",{className:"btn btn-blue btn-sm",onClick:doSubmit},"Submit"),
        e("button",{className:"btn btn-outline btn-sm",onClick:doRecall,disabled:!lastSubmitVal},"Recall Last")
      ),
      e("table",{className:"data-table"},
        e("thead",null,e("tr",null,
          e("th",null,"Employee"),e("th",null,"Title"),
          e("th",{className:"text-right"},"Budget"),
          e("th",{className:"text-right"},"Projects & T&E"),
          e("th",{className:"text-right"},"Variance")
        )),
        e("tbody",null,emp.subordinates.map(function(sid){
          var sub=employees[sid];
          var spend=calcProjectTotal(sub.projects)+calcTETotal(sub.te);
          var variance=sub.budget-spend;
          return e("tr",{key:sid},
            e("td",null,e("strong",null,sub.name)),
            e("td",{style:{color:"var(--muted)"}},sub.title),
            e("td",{className:"text-right mono"},fmt(sub.budget)),
            e("td",{className:"text-right mono"},fmt(spend)),
            e("td",{className:"text-right mono",style:{color:variance<0?"var(--danger)":"var(--success)"}},fmt(variance))
          );
        }))
      )
    ):null
  );
}

    var oc=calcOwnComp(e2);
    var tc=e2.subordinates.reduce(function(ts,gsid){return ts+getEffectiveComp(employees[gsid],e2);},0);
    var sb=e2.subordinates.reduce(function(ts,gsid){return ts+(employees[gsid]?employees[gsid].budget:0);},0);
    return s+oc+tc+sb+calcProjectTotal(e2.projects)+calcTETotal(e2.te);
  },jangOwn);

  return e("div",{className:"home"},
    e("div",{className:"home-hero"},
      e("div",{className:"home-eyebrow"},"The Reading Corp - Financial Command Center"),
      e("div",{className:"home-headline"},"MY ",e("span",null,"CFO")),
      e("div",{className:"home-sub"},"Select your profile to access your personalized financial dashboard"),
      e("div",{style:{display:"flex",justifyContent:"center",gap:40,marginTop:28,marginBottom:40}},
        [{label:"Total Company Budget",val:fmt(totalBudget),color:"var(--blue)"},
         {label:"Total Allocated",val:fmt(totalAllocated),color:"var(--warning)"},
         {label:"Total Employees",val:22,color:"var(--success)"}
        ].map(function(s){
          return e("div",{key:s.label,style:{textAlign:"center"}},
            e("div",{className:"label-sm"},s.label),
            e("div",{style:{fontFamily:"var(--display)",fontWeight:700,fontSize:30,color:s.color}},s.val)
          );
        })
      ),
      e("div",{className:"home-select-wrap"},
        e("div",{className:"home-select-label"},"Quick Access - Select Employee"),
        e("select",{className:"home-select",value:selected,onChange:function(ev){setSelected(ev.target.value);}},
          e("option",{value:""},"-- Choose an employee --"),
          DEPARTMENTS.map(function(dept){
            return e("optgroup",{key:dept.key,label:dept.label},
              dept.members.map(function(id){
                return e("option",{key:id,value:id},employees[id].name+" - "+employees[id].title);
              })
            );
          })
        ),
        e("button",{className:"btn btn-red home-go-btn",disabled:!selected,onClick:function(){if(selected)onSelect(selected);}},"LAUNCH DASHBOARD")
      )
    ),
    e("div",{className:"label-sm",style:{marginBottom:16}},"Departments"),
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}},
      DEPARTMENTS.map(function(dept){
        var head=employees[dept.head];
        var deptBudget=head.budget;
        var headOwnComp=calcOwnComp(head);
        var headTeamComp=head.subordinates.reduce(function(s,sid){return s+getEffectiveComp(employees[sid],head);},0);
        var subProjBudgets=head.subordinates.reduce(function(s,sid){return s+(employees[sid]?employees[sid].budget:0);},0);
        var deptSpend=headOwnComp+headTeamComp+subProjBudgets+calcProjectTotal(head.projects)+calcTETotal(head.te);
        var pct=deptBudget>0?Math.min((deptSpend/deptBudget)*100,100):0;
        var isOpen=expandedDept===dept.key;
        return e("div",{key:dept.key,style:{background:"var(--surface)",border:"1.5px solid "+(isOpen?dept.color:"var(--border)"),borderRadius:8,overflow:"hidden",transition:"border-color .15s"}},
          e("div",{onClick:function(){setExpanded(isOpen?null:dept.key);},style:{padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,borderBottom:isOpen?"1px solid var(--border)":"none"}},
            e("div",{style:{width:4,height:40,borderRadius:2,background:dept.color,flexShrink:0}}),
            e("div",{style:{flex:1}},
              e("div",{style:{fontFamily:"var(--display)",fontWeight:700,fontSize:17,color:"var(--navy)"}},dept.label),
              e("div",{style:{fontSize:11,color:"var(--muted)",marginTop:2}},"Head: "+head.name+" / "+dept.members.length+" members")
            ),
            e("div",{style:{textAlign:"right"}},
              e("div",{style:{fontFamily:"var(--mono)",fontSize:13,color:dept.color,fontWeight:600}},fmt(deptBudget)),
              e("div",{style:{fontSize:10,color:"var(--muted)"}},"budget")
            ),
            e("div",{style:{color:"var(--muted)",fontSize:12,marginLeft:4}},isOpen?"^":"v")
          ),
          e("div",{style:{height:3,background:"var(--border)"}},
            e("div",{style:{height:"100%",width:pct+"%",background:dept.color,transition:"width .4s"}})
          ),
          isOpen?e("div",{style:{padding:"12px 18px"}},
            dept.members.map(function(id){
              var emp2=employees[id];
              return e("div",{key:id,
                onClick:function(){onSelect(id);},
                style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 10px",borderRadius:6,cursor:"pointer",marginBottom:4},
                onMouseEnter:function(ev){ev.currentTarget.style.background="#EEF4FB";},
                onMouseLeave:function(ev){ev.currentTarget.style.background="transparent";}
              },
                e("div",null,
                  e("div",{style:{fontWeight:600,fontSize:13,color:"var(--navy)"}},emp2.name),
                  e("div",{style:{fontSize:11,color:"var(--muted)"}},emp2.title)
                ),
                e("div",{style:{textAlign:"right"}},
                  e("div",{style:{fontFamily:"var(--mono)",fontSize:12,color:"var(--blue)",fontWeight:600}},fmt(emp2.budget)),
                  e("div",{style:{fontSize:10,color:"var(--muted)"}},"budget")
                ),
                e("div",{style:{color:"var(--blue)",fontSize:12,marginLeft:10}},">")
              );
            })
          ):null
        );
      })
    )
  );
}

function App() {
  var empState=useState(loadState()||INITIAL);
  var employees=empState[0]; var setEmployees=empState[1];
  var curState=useState(null);
  var currentEmp=curState[0]; var setCurrentEmp=curState[1];
  var saveState2=useState("idle");
  var saveStatus=saveState2[0]; var setSaveStatus=saveState2[1];
  var nowState=useState(new Date());
  var now=nowState[0]; var setNow=nowState[1];

  useEffect(function(){
    var t=setInterval(function(){setNow(new Date());},1000);
    return function(){clearInterval(t);};
  },[]);

  function doSave(){
    setSaveStatus("saving");
    saveState(employees);
    setSaveStatus("saved");
    setTimeout(function(){setSaveStatus("idle");},2000);
  }
  function doReset(){
    if(!window.confirm("Reset ALL data to defaults?"))return;
    deleteState();
    setEmployees(INITIAL);
    setCurrentEmp(null);
  }

  return e("div",{className:"app"},
    e("header",{className:"hdr"},
      e("div",{className:"hdr-inner"},
        e("div",{className:"logo-text"},"The Reading",e("strong",null,"Corp")),
        e("div",{className:"hdr-divider"}),
        e("div",{className:"hdr-title"},"MY ",e("span",null,"CFO")),
        e("div",{className:"hdr-right"},
          e("div",{className:"hdr-time"},now.toLocaleDateString()+" "+now.toLocaleTimeString()),
          saveStatus==="saved"?e("span",{className:"pill pill-green"},"Saved"):null,
          e("button",{className:"btn btn-outline btn-sm",onClick:doSave},saveStatus==="saving"?"Saving...":"Save"),
          e("button",{className:"btn btn-ghost btn-sm",onClick:doReset},"Reset"),
          currentEmp?e("button",{className:"btn btn-red btn-sm",onClick:function(){setCurrentEmp(null);}},"Home"):null
        )
      )
    ),
    currentEmp?
      e(EmployeeDashboard,{empId:currentEmp,employees:employees,setEmployees:setEmployees,onBack:function(){setCurrentEmp(null);}}):
      e(HomePage,{employees:employees,onSelect:function(id){setCurrentEmp(id);}})
  );
}

var root=ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App));
</script>
</body>
</html>
